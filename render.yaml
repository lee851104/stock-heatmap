services:
  - type: web
    name: stock-heatmap
    runtime: python
    pythonVersion: "3.11"
    buildCommand: "pip install -r backend/requirements.txt && cd frontend && npm install && npm run build"
    startCommand: "cd backend && gunicorn --workers 2 --worker-class sync --timeout 60 --bind 0.0.0.0:$PORT app:app"
    envVars:
      - key: PORT
        value: "5000"
    healthCheckPath: /
