services:
  - type: web
    name: stock-heatmap
    runtime: python
    pythonVersion: 3.11

    buildCommand: >
      pip install -r backend/requirements.txt &&
      cd frontend &&
      npm install &&
      npm run build

    startCommand: cd backend && python app.py

    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: PORT
        value: 5000

    healthCheckPath: /
